<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error en la solicitud</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 430px;
            border-top: 6px solid #f59e0b;
        }
        .icon {
            font-size: 3.5rem;
            color: #f59e0b;
            margin-bottom: 1rem;
        }
        h2 { color: #92400e; margin-bottom: 0.5rem; }
        p  { color: #666; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #002855;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .secondary-link {
            display: block;
            margin-top: 1rem;
            color: #002855;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .code {
            display: block;
            margin-top: 1.5rem;
            font-family: monospace;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#9888;</div>
        <h2>Solicitud no procesada</h2>
        <p>{{ mensaje or 'Revise los datos enviados e intente nuevamente.' }}</p>
        <a href="{{ url_for(volver_endpoint or 'index') }}" class="btn">Volver al panel</a>
        <a href="{{ url_for('index') }}" class="secondary-link">Ir al inicio</a>
        <span class="code">Error {{ status or 400 }}</span>
    </div>
</body>
</html>
