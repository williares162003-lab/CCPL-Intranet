<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del Servidor</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            border-top: 6px solid #e74c3c;
        }
        .icon {
            font-size: 3.5rem;
            color: #e74c3c;
            margin-bottom: 1rem;
        }
        h2 { color: #c0392b; margin-bottom: 0.5rem; }
        p  { color: #666; margin-bottom: 2rem; }
        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            background-color: #e74c3c;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #c0392b; }
        .code {
            display: block;
            margin-top: 1.5rem;
            font-family: monospace;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#9888;</div>
        <h2>Error del servidor</h2>
        <p>Ocurrió un problema al procesar la solicitud. Por favor intente nuevamente.</p>
        <a href="{{ url_for('index') }}" class="btn">Volver al inicio</a>
        <span class="code">Error 500 – Internal Server Error</span>
    </div>
</body>
</html>
