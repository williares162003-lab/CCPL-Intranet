    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#adc2d0"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
